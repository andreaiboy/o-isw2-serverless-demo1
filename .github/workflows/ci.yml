on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Verificar archivos
        run: ls -la

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas (si existen)
        run: npm test --if-present
